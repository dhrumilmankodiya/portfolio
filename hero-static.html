<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dhrumil Mankodiya | Building an Empire at 23</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@11/dist/framer-motion.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #FFFFFF;
      color: #000000;
    }
    
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      text-align: center;
    }
    
    .tagline {
      font-size: 72px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 24px;
    }
    
    .subtitle {
      font-size: 16px;
      opacity: 0.8;
      margin-bottom: 64px;
    }
    
    .stats-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 64px;
    }
    
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .stat-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background-color: #2563EB;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    
    .stat-icon svg {
      width: 32px;
      height: 32px;
      color: white;
    }
    
    .stat-value {
      font-size: 48px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 8px;
    }
    
    .stat-label {
      font-size: 16px;
      opacity: 0.7;
    }
    
    .scroll-indicator {
      margin-top: 80px;
    }
    
    .scroll-box {
      width: 24px;
      height: 40px;
      border: 2px solid #000000;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      padding-top: 8px;
      margin: 0 auto;
    }
    
    .scroll-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #2563EB;
      animation: scrollBounce 1.5s ease-in-out infinite;
    }
    
    @keyframes scrollBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(12px); }
    }
    
    /* Animation classes */
    .fade-in {
      opacity: 0;
      animation: fadeIn 0.8s ease-out forwards;
    }
    
    .slide-up {
      opacity: 0;
      transform: translateY(40px);
      animation: slideUp 0.8s ease-out forwards;
    }
    
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    
    @keyframes slideUp {
      to { 
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.55s; }
    .delay-4 { animation-delay: 0.7s; }
    .delay-5 { animation-delay: 1s; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;
    const { motion } = window.FramerMotion;
    
    // Icons as SVG components
    const PackageIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M16.5 9.4 7.55 4.24"/>
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        <polyline points="3.29 7 12 12 20.71 7"/>
        <line x1="12" x2="12" y1="22" y2="12"/>
      </svg>
    );
    
    const RocketIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
        <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 14 2c1.73 0 3 1.34 3 2.95 0 .66-.08 1.31-.23 1.95l3.23 3.23c.29.29.58.58.86.86L12 15z"/>
        <path d="M12 15v6"/>
        <path d="M9 12h6"/>
      </svg>
    );
    
    const ClockIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    );
    
    const stats = [
      { value: "19+", label: "Products Shipped", icon: PackageIcon },
      { value: "6", label: "Ventures", icon: RocketIcon },
      { value: "4+", label: "Years", icon: ClockIcon },
    ];
    
    function Hero() {
      return (
        <section className="hero">
          {/* Main Tagline */}
          <motion.h1
            initial={{ opacity: 0, y: 40 }}
            animate={{ opacity: 1, y: 0 }}
            transition={{ duration: 0.8, ease: "easeOut" }}
            className="tagline fade-in"
          >
            Building an empire at 23.
          </motion.h1>
          
          {/* Subtitle */}
          <motion.p
            initial={{ opacity: 0, y: 30 }}
            animate={{ opacity: 1, y: 0 }}
            transition={{ duration: 0.8, delay: 0.2, ease: "easeOut" }}
            className="subtitle slide-up delay-1"
          >
            Product Designer. Entrepreneur. Visionary.
          </motion.p>
          
          {/* Stats Display */}
          <div className="stats-container">
            {stats.map((stat, index) => {
              const Icon = stat.icon;
              return (
                <motion.div
                  key={stat.label}
                  initial={{ opacity: 0, y: 30 }}
                  animate={{ opacity: 1, y: 0 }}
                  transition={{
                    duration: 0.6,
                    delay: 0.4 + index * 0.15,
                    ease: "easeOut",
                  }}
                  className={`stat-item slide-up delay-${index + 2}`}
                >
                  <div className="stat-icon">
                    <Icon />
                  </div>
                  <span className="stat-value">{stat.value}</span>
                  <span className="stat-label">{stat.label}</span>
                </motion.div>
              );
            })}
          </div>
          
          {/* Scroll Indicator */}
          <motion.div
            initial={{ opacity: 0 }}
            animate={{ opacity: 1 }}
            transition={{ duration: 0.6, delay: 1 }}
            className="scroll-indicator fade-in delay-5"
          >
            <div className="scroll-box">
              <div className="scroll-dot"></div>
            </div>
          </motion.div>
        </section>
      );
    }
    
    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Hero />);
  </script>
</body>
</html>
